# ─── CI (Integración Continua) ────────────────────────────────────────────────
# Este flujo se ejecuta en cada Pull Request y push a main para garantizar
# la calidad del código (lint, typecheck y pruebas unitarias).
#
# El despliegue a producción lo realiza de forma nativa e independiente Vercel
# al detectar los cambios en la rama main.
# ──────────────────────────────────────────────────────────────────────────────

name: CI Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test
